services:
  - type: web
    name: bspqa-api
    runtime: python
    buildCommand: uv sync --frozen && uv cache prune --ci
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_CLUSTER_ENDPOINT
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
